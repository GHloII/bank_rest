openapi: '3.0.3'
info:
  title: Bank Card Management API
  version: "1.0"
servers:
  - url: http://localhost:8080

tags:
  - name: Authentication
  - name: Cards
  - name: Transactions
  - name: Users

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cards/admin:
    post:
      tags:
        - Cards
      summary: Admin - create card for user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cards/me:
    get:
      tags:
        - Cards
      summary: User - list my cards with filters and pagination
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          required: false
          description: Card status filter (can be repeated)
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CardStatus'
        - in: query
          name: ownerName
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCardDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cards/me/{cardId}:
    get:
      tags:
        - Cards
      summary: User - get my card by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cardId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/me:
    get:
      tags:
        - Users
      summary: User - get my profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/admin:
    post:
      tags:
        - Users
      summary: Admin - create user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
        - in: query
          name: password
          required: true
          schema:
            type: string
        - in: query
          name: email
          required: true
          schema:
            type: string
        - in: query
          name: fullName
          required: false
          schema:
            type: string
        - in: query
          name: enabled
          required: false
          schema:
            type: boolean
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      tags:
        - Users
      summary: Admin - list all users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageUserDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/admin/search:
    get:
      tags:
        - Users
      summary: Admin - search users by username/email
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageUserDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/admin/role:
    get:
      tags:
        - Users
      summary: Admin - list users by role name
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: roleName
          required: true
          schema:
            type: string
            example: ROLE_USER
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageUserDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /users/admin/{id}:
    get:
      tags:
        - Users
      summary: Admin - get user by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    patch:
      tags:
        - Users
      summary: Admin - update user (email/fullName/enabled)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: email
          required: false
          schema:
            type: string
        - in: query
          name: fullName
          required: false
          schema:
            type: string
        - in: query
          name: enabled
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      tags:
        - Users
      summary: Admin - delete user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cards/me/{cardId}/block-request:
    post:
      tags:
        - Cards
      summary: User - request card blocking
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cardId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDTO'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cards/admin/search:
    get:
      tags:
        - Cards
      summary: Admin - search cards with pagination
      description: All query parameters are optional. If you pass no filters, this endpoint returns ALL cards (paginated).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          required: false
          description: Filter by user id. Omit to search across all users.
          schema:
            type: integer
            format: int64
          example: 1
        - in: query
          name: status
          required: false
          description: Filter by card status. Omit to include any status.
          schema:
            $ref: '#/components/schemas/CardStatus'
          example: ACTIVE
        - in: query
          name: last4
          required: false
          description: Filter by exact last 4 digits of PAN. Omit to include any.
          schema:
            type: string
            pattern: '^\\d{4}$'
          example: '4444'
        - in: query
          name: ownerName
          required: false
          description: Filter by owner name substring (case-insensitive). Omit to include any.
          schema:
            type: string
          example: 'john'
        - in: query
          name: includeDeleted
          required: false

          schema:
            type: boolean
          example: false
        - in: query
          name: page
          required: false

          schema:
            type: integer
            minimum: 0
          example: 0
        - in: query
          name: size
          required: false

          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCardDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /cards/admin/{cardId}:
    patch:
      tags:
        - Cards
      summary: Admin - update card (ownerName/status)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cardId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCardDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

    delete:
      tags:
        - Cards
      summary: Admin - soft delete card
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cardId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /transactions:
    post:
      tags:
        - Transactions
      summary: User - top up card balance (deposit)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopUpRequestDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDTO'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /transactions/transfer:
    post:
      tags:
        - Transactions
      summary: User - transfer between own cards
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDTO'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /transactions/me:
    get:
      tags:
        - Transactions
      summary: User - my transactions history
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageTransactionDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /transactions/me/card/{cardId}:
    get:
      tags:
        - Transactions
      summary: User - my transactions by card
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cardId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageTransactionDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required:
        - token
        - type
      properties:
        token:
          type: string
        type:
          type: string
          example: Bearer
        id:
          type: integer
          format: int64
        username:
          type: string

    CardStatus:
      type: string
      enum:
        - ACTIVE
        - BLOCKED
        - EXPIRED

    CreateCardDTO:
      type: object
      required:
        - pan
        - expiryMonth
        - expiryYear
      properties:
        pan:
          type: string
          pattern: '^\\d{16}$'
          description: Primary account number (PAN). 16 digits.
          example: '1111222233334444'
        ownerName:
          type: string
          maxLength: 100
          description: Card owner name (optional). If empty, it will be derived from user profile.
          example: John Doe
        expiryMonth:
          type: integer
          minimum: 1
          maximum: 12
          description: Expiry month (1..12)
          example: 12
        expiryYear:
          type: integer
          minimum: 2000
          description: Expiry year (>= 2000)
          example: 2099

    UpdateCardDTO:
      type: object
      properties:
        ownerName:
          type: string
          maxLength: 100
        status:
          $ref: '#/components/schemas/CardStatus'

    CardDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 101
        panMasked:
          type: string
          description: Masked card number showing only last 4 digits.
          example: '**** **** **** 1234'
        ownerName:
          type: string
          description: Name of the card holder.
          example: 'John Doe'
        expiryMonth:
          type: integer
          description: Card expiry month (1-12).
          example: 12
        expiryYear:
          type: integer
          description: Card expiry year.
          example: 2028
        status:
          $ref: '#/components/schemas/CardStatus'
        balance:
          type: string
          description: Current balance of the card (BigDecimal).
          example: '1250.50'

    PageCardDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CardDTO'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    TransactionType:
      type: string
      enum:
        - TRANSFER
        - DEPOSIT
        - WITHDRAW

    TransactionStatus:
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED

    TransactionRequestDTO:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string
          description: BigDecimal
          example: '100.00'

    TopUpRequestDTO:
      type: object
      required:
        - cardId
        - amount
      properties:
        cardId:
          type: integer
          format: int64
          description: ID of the card to top up.
          example: 101
        amount:
          type: string
          description: Amount to deposit (BigDecimal). Must be at least 0.01.
          example: '100.00'

    TransferDTO:
      type: object
      required:
        - fromCardId
        - toCardId
        - amount
        - idempotencyKey
      properties:
        fromCardId:
          type: integer
          format: int64
          description: Source card ID.
          example: 101
        toCardId:
          type: integer
          format: int64
          description: Target card ID.
          example: 102
        amount:
          type: string
          description: Amount to transfer (BigDecimal).
          example: '50.00'
        idempotencyKey:
          type: string
          maxLength: 100
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Unique key to prevent duplicate transfers.
          example: 'req-abc-123'

    TransactionDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 501
        fromCardId:
          type: integer
          format: int64
          description: Source card ID (null for deposits).
          example: 101
        toCardId:
          type: integer
          format: int64
          description: Target card ID (null for withdrawals).
          example: 102
        amount:
          type: string
          description: Transaction amount (BigDecimal).
          example: '50.00'
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        createdAt:
          type: string
          format: date-time
          example: '2024-03-07T22:00:00Z'

    PageTransactionDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDTO'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    CreateUserDTO:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          description: Unique username for the user. Only letters, numbers and underscores allowed.
          example: 'john_doe123'
        password:
          type: string
          minLength: 6
          description: User password (min 6 characters).
          example: 'secret123'
        email:
          type: string
          format: email
          maxLength: 100
          description: User email address.
          example: 'john.doe@example.com'
        fullName:
          type: string
          maxLength: 100
          description: Optional full name of the user.
          example: 'John Doe'
        enabled:
          type: boolean
          description: Whether the user account is enabled.
          example: true

    UpdateUserDTO:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 100
          description: New email address.
          example: 'new.email@example.com'
        fullName:
          type: string
          maxLength: 100
          description: New full name.
          example: 'John Q. Doe'
        enabled:
