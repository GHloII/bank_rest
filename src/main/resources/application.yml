#
# application.yml — главный конфигурационный файл Spring Boot.

#Что нужно сделать:
#  - Указать настройки подключения к базе данных.
#  - Указать порт приложения.
#  - Настроить параметры безопасности и JWT.
#  - Включить Swagger UI.

# Main Spring Boot configuration file

server:
  port: 8080

spring:
  # Database connection
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bank_db}
    username: ${DB_USER:bank_user}
    password: ${DB_PASSWORD:bank_password}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate        # managed by Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Liquibase migrations
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

# JWT configuration
app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJwtGenerationThatShouldBeAtLeast32CharactersLong}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in ms

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true