databaseChangeLog:
  - changeSet:
      id: 12
      author: author
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "1"
            sql: |
              SELECT CASE
                WHEN EXISTS (
                  SELECT 1
                  FROM pg_attribute a
                  JOIN pg_class c ON c.oid = a.attrelid
                  JOIN pg_namespace n ON n.oid = c.relnamespace
                  JOIN pg_type t ON t.oid = a.atttypid
                  WHERE n.nspname = 'public'
                    AND c.relname = 'cards'
                    AND a.attname = 'owner_name'
                    AND t.typname = 'bytea'
                    AND a.attnum > 0
                    AND NOT a.attisdropped
                ) THEN 1 ELSE 0 END;
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: |
              ALTER TABLE public.cards
                ALTER COLUMN owner_name
                TYPE VARCHAR(100)
                USING encode(owner_name, 'escape');
